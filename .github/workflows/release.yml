name: Build release assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-test-and-upload:
    name: Test, build, and upload release assets
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          with pathlib.Path("pyproject.toml").open("rb") as handle:
              version = tomllib.load(handle)["project"]["version"]

          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(
                  f"Release tag {tag!r} does not match pyproject version {version!r}; "
                  f"expected {expected!r}."
              )
          print(f"Building {tag} from package version {version}.")
          PY

      - name: Run regression tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Build immutable source ZIP from the tag
        run: |
          VERSION="${RELEASE_TAG#v}"
          git archive \
            --format=zip \
            --prefix="mesbg-probability-engine-${VERSION}/" \
            --output="dist/mesbg-probability-engine-${VERSION}-source.zip" \
            "$RELEASE_TAG"

      - name: Smoke-test the built wheel
        run: |
          python -m pip install --target /tmp/mesbg-release-wheel dist/*.whl
          PYTHONPATH=/tmp/mesbg-release-wheel python -m mesbg_probability --help

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Retain workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mesbg-probability-engine-${{ env.RELEASE_TAG }}
          path: dist/*
          if-no-files-found: error

      - name: Upload assets to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber
